name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  core:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      posargs: -n auto --color=yes
      envs: |
        - linux: py313-minimal
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    timeout-minutes: 12
  sdist_verify:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - run: python -m pip install -U --user build
    - run: python -m build . --sdist
    - run: python -m pip install -U --user twine
    - run: python -m twine check dist/*
    timeout-minutes: 12
  test:
    needs:
    - core
    - sdist_verify
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      posargs: -n auto --color=yes
      libraries: |
        brew:
          - openjpeg
        apt:
          - libopenjp2-7
      envs: |
        - linux: py314
        - windows: py313
        - macos: py313
        - linux: py312-oldestdeps
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  threading:
    needs:
    - core
    - sdist_verify
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      posargs: -n auto --color=yes
      libraries: |
        brew:
          - openjpeg
        apt:
          - libopenjp2-7
      setenv: |
        RUSTUP_TOOLCHAIN: stable  # needed for building mocpy (a dependency of reproject)
      envs: |
        - linux: py314
          name: py314 (parallel threads)
          posargs: --parallel-threads=auto --color=yes
        - linux: py314t-devdeps-minimal
          name: py314t-devdeps
        - linux: py314t-devdeps-minimal
          name: py314t-devdeps (parallel threads)
          posargs: --parallel-threads=auto --color=yes
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  docs:
    needs:
    - core
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      default_python: '3.13'
      submodules: false
      pytest: false
      toxdeps: tox-pypi-filter
      cache-path: |
        docs/_build/
        docs/generated/
        .tox/sample_data/
      cache-key: docs-${{ github.run_id }}
      libraries: |
        apt:
          - libopenjp2-7
          - graphviz
      envs: |
        - linux: build_docs
          pytest: false
          # Speed up CI builds by not building full nav tree
          posargs: -D html_theme_options.collapse_navigation=True
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  online:
    if: ${{ !cancelled() && (!startsWith(github.event.ref, 'refs/tags/v')) }}
    needs:
    - docs
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2
    with:
      default_python: '3.13'
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      libraries: |
        apt:
          - libopenjp2-7
          - graphviz
      envs: |
        - linux: build_docs-gallery
          # Speed up CI builds by not building full nav tree
          posargs: -D html_theme_options.collapse_navigation=True
          pytest: false
          cache-path: |
            docs/_build/
            docs/generated/
            .tox/sample_data/
          cache-key: docs-${{ github.run_id }}
        - linux: py313-online
          posargs: -n auto --dist loadgroup --color=yes
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    timeout-minutes: 12
  build_dists:
    if: |-
      ${{ !cancelled() && (github.event_name != 'pull_request' ||
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'Run publish')
      )) }}
    needs:
    - test
    - docs
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish.yml@v2
    with:
      sdist: false
      targets: |
        - cp3{12,13,14}-manylinux*_x86_64
        - cp3{12,13,14}-macosx_x86_64
        - cp3{12,13,14}-macosx_arm64
        - cp3{12,13,14}-win_amd64
        - target: cp3{12,13,14}-manylinux_aarch64
          runs-on: ubuntu-24.04-arm
      test_extras: tests
      test_command: pytest -p no:warnings --doctest-rst --pyargs sunpy
      submodules: false
      save_artifacts: true
      upload_to_pypi: false
      upload_to_anaconda: ${{ github.event_name == 'workflow_dispatch' && github.ref
        == 'refs/heads/main' }}
      anaconda_user: scientific-python-nightly-wheels
      anaconda_package: sunpy
      anaconda_keep_n_latest: 1
      env: |
        EXTENSION_HELPERS_PY_LIMITED_API: 'cp312'
    secrets:
      anaconda_token: ${{ secrets.anaconda_org_upload_token }}
    timeout-minutes: 12
  publish_pure:
    if: |-
      ${{ !cancelled() && (github.event_name != 'pull_request' ||
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'Run publish')
      )) }}
    needs:
    - test
    - docs
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish_pure_python.yml@v2
    with:
      python-version: '3.13'
      test_extras: tests
      test_command: pytest -p no:warnings --doctest-rst -m "not mpl_image_compare"
        --pyargs sunpy
      submodules: false
      env: |
        SUNPY_NO_BUILD_ANA_EXTENSION: 1
      save_artifacts: true
      upload_to_pypi: false
    timeout-minutes: 12
  publish:
    if: ${{ !cancelled() && (startsWith(github.ref, 'refs/tags/v')) }}
    name: Upload to PyPI
    runs-on: self-hosted
    needs:
    - build_dists
    - publish_pure
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true
        pattern: dist-*
        path: dist
    - run: ls -lha dist/
    - name: Run upload
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
    timeout-minutes: 12
  notify:
    if: ${{ !cancelled() && (!cancelled() && (github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule')) }}
    needs:
    - build_dists
    - publish_pure
    - online
    runs-on: self-hosted
    environment:
      name: matrix
    steps:
    - uses: Cadair/matrix-notify-action@main
      with:
        workflow_description: CI Workflow
        matrix_token: ${{ secrets.MATRIX_ACCESS_TOKEN }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
        homeserver: ${{ secrets.MATRIX_HOMESERVER }}
        roomid: '!JYqfIVJjWANcHnfktY:cadair.com'
        ignore_pattern: .*(Load|report overall).*
        summarise_success: true
    timeout-minutes: 12
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
  push:
    branches:
    - main
    - '*.*'
    - '!*backport*'
    tags:
    - v*
    - '!*dev*'
    - '!*pre*'
    - '!*post*'
  pull_request: null
  workflow_dispatch: null
